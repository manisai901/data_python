services:
  - type: web
    name: personal-ai-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=10000 --server.address=0.0.0.0 --client.showErrorDetails=false
    pythonVersion: 3.11
    envVars:
      - key: STREAMLIT_SERVER_PORT
        value: 10000
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0
      - key: STREAMLIT_CLIENT_SHOW_ERROR_DETAILS
        value: false
